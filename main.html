<!DOCTYPE html>
<html>
<head>
 <meta charset="utf-8">
 <meta name="viewport" content="width=device-width, initial-scale=1">
 <title>Weather App</title>
 <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
 <link rel="stylesheet" href="styles.css">
</head>
<body>
 <div class="container d-flex justify-center-center align-items-center min-vh-100">
  <div class="weather-card">
   <div class="text-center mb-4">
    <h2 class="app-title">Weather</h2>
    <p class="subtitle">Check your city's weather</p>
   </div>

   <div class="search-box mb-4">
    <input type="text" name="" class="form-control" placeholder="Entry city">
    <button class="btn btn-search">Search</button>
   </div>

   <div class="current-weather text-center">
    <h3 class="city">New York</h3>
    <img src="https://openweathermap.org/img/wn/01d@2x.png">
    <h1 class="temp">23</h1>
    <p class="desc">Sunny</p>

    <div class="details">
     <div>💧<span></span>60%</div>
     <div>🌬️<span></span>10 m/s</div>
    </div>
   </div>


   <div class="forecast-section">
    <div class="forecast">

     <div class="forecast-card">
      <p>Mon</p>
      <img src="https://openweathermap.org/img/wn/01d.png">
      <span>22</span>
     </div>

     <div class="forecast-card">
      <p>Tue</p>
      <img src="https://openweathermap.org/img/wn/02d.png">
      <span>20</span>
     </div>

     <div class="forecast-card">
      <p>Wed</p>
      <img src="https://openweathermap.org/img/wn/03d.png">
      <span>23</span>
     </div>

     <div class="forecast-card">
      <p>Thu</p>
      <img src="https://openweathermap.org/img/wn/04d.png">
      <span>18</span>
     </div>

     <div class="forecast-card">
      <p>Fri</p>
      <img src="https://openweathermap.org/img/wn/04d.png">
      <span>19</span>
     </div>
    </div>
   </div>
  </div>
 </div>



</body>
</html>
